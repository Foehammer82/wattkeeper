name: Release

on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      version:
        description: "Release tag to build and publish (e.g. v0.1.1 or v0.1.1-rc1)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  release-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Enable QEMU for pi-gen
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Test
        run: uv run wk check test

      - name: Build release artifacts
        run: |
          uv run wk release agent --version ${{ inputs.version || github.ref_name }}
          uv run wk image node --version ${{ inputs.version || github.ref_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          prerelease: ${{ contains(inputs.version || github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/SHA256SUMS
            dist/*.img.xz
            dist/*.img.xz.sha256

  release-controller-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: controller/web/package-lock.json

      - name: Install controller web dependencies
        run: npm ci --prefix controller/web

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Build controller web scaffold
        run: uv run wk build controller-web

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wattkeeper-controller
          tags: |
            type=raw,value=${{ inputs.version || github.ref_name }}
            type=raw,value=latest,enable=${{ !contains(inputs.version || github.ref_name, '-') }}

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: controller/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ inputs.version || github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-agent-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/wattkeeper-agent
          tags: |
            type=raw,value=${{ inputs.version || github.ref_name }}
            type=raw,value=latest,enable=${{ !contains(inputs.version || github.ref_name, '-') }}

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ inputs.version || github.ref_name }}
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
