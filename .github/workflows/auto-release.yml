name: Auto Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "mkdocs.yml"
      - ".github/skills/**"
      - ".github/prompts/**"

permissions:
  contents: read

jobs:
  tag:
    # Maintainers can add "[skip release]" to a merge/push commit message to
    # land main-only changes (docs, CI tweaks, etc.) without cutting a patch
    # release for the configured major.minor train.
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize only version computation + tag push (a few seconds) across
    # pushes to main, so two near-simultaneous pushes can't compute and push
    # the same next version. Deliberately NOT shared with the `release` job
    # below: image builds there can take a long time, and this job must not
    # queue behind (or get starved by) a slow in-flight release build, or a
    # later push's release would never get computed/tagged. Each version's
    # actual build/publish is serialized independently via release.yml's own
    # per-version concurrency group instead.
    concurrency:
      group: auto-release-version
      cancel-in-progress: false
    outputs:
      version: ${{ steps.next.outputs.version }}
      prerelease: ${{ steps.next.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Compute next release version
        id: next
        run: uv run strom release next-version --github-output

      - name: Create and push release tag
        env:
          VERSION: ${{ steps.next.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

  release:
    needs: tag
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      version: ${{ needs.tag.outputs.version }}
